<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Seed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #09080700;
      --paper:     #0f0d0b;
      --surface:   #161310;
      --border:    #272320;
      --text:      #e2dbd0;
      --muted:     #6e665e;
      --faint:     #2e2a26;
      --accent:    #c8ff4a;
      --sprout:    #4aff8c;
      --seed-col:  #c8a96e;
      --danger:    #ff6b6b;
    }

    body {
      width: 340px;
      background: var(--paper);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -20px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 255, 74, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 2px;
    }

    .brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .brand em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .version {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .tagline {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .ctrl-btn {
      flex: 1;
      padding: 10px 12px;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      text-align: center;
    }

    .ctrl-btn:last-child { border-right: none; }
    .ctrl-btn:hover { background: var(--surface); color: var(--text); }
    .ctrl-btn.active { color: var(--accent); }
    .ctrl-btn.danger:hover { color: var(--danger); }

    /* ── Task list ── */
    #task-list {
      max-height: 340px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--faint) transparent;
    }

    #task-list::-webkit-scrollbar { width: 3px; }
    #task-list::-webkit-scrollbar-track { background: transparent; }
    #task-list::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

    .empty {
      padding: 36px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.8;
      letter-spacing: 0.03em;
    }

    .empty .empty-icon {
      display: block;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 28px;
      color: rgba(200, 169, 110, 0.4);
      margin-bottom: 10px;
    }

    /* ── Task item ── */
    .task-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto;
      gap: 5px 8px;
      transition: background 0.12s;
      position: relative;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--surface); }

    .task-url {
      grid-column: 1;
      grid-row: 1;
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .task-delete {
      grid-column: 2;
      grid-row: 1;
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .task-item:hover .task-delete { opacity: 0.5; }
    .task-delete:hover { opacity: 1 !important; color: var(--danger) !important; }

    /* ── Progress bar ── */
    .task-progress-wrap {
      grid-column: 1 / -1;
      grid-row: 2;
      position: relative;
      height: 3px;
      background: var(--faint);
      border-radius: 2px;
      overflow: visible;
    }

    .task-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .task-item[data-state="seed"]   .task-progress-fill { background: var(--seed-col); }
    .task-item[data-state="sprout"] .task-progress-fill { background: var(--sprout); box-shadow: 0 0 6px rgba(74, 255, 140, 0.5); }
    .task-item[data-state="tree"]   .task-progress-fill { background: var(--accent); box-shadow: 0 0 8px rgba(200, 255, 74, 0.6); }

    /* threshold tick marks at 30% (3/10) */
    .task-progress-wrap::after {
      content: '';
      position: absolute;
      left: 30%;
      top: -2px;
      width: 1px;
      height: 7px;
      background: var(--muted);
      opacity: 0.4;
      border-radius: 1px;
    }

    /* ── Meta row ── */
    .task-meta {
      grid-column: 1 / -1;
      grid-row: 3;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .task-state-pill {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
    }

    .task-item[data-state="seed"]   .task-state-pill { background: rgba(200, 169, 110, 0.12); color: var(--seed-col); }
    .task-item[data-state="sprout"] .task-state-pill { background: rgba(74, 255, 140, 0.1);  color: var(--sprout); }
    .task-item[data-state="tree"]   .task-state-pill { background: rgba(200, 255, 74, 0.12); color: var(--accent); }

    .task-runs {
      font-size: 10px;
      color: var(--muted);
    }

    .task-runs strong {
      color: var(--text);
      font-weight: 500;
    }

    .task-steps {
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-stat {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .footer-stat strong {
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="brand">Open <em>Seed</em></div>
      <div class="version">v0.1.0</div>
    </div>
    <div class="tagline">task automation that learns by watching</div>
  </header>

  <div class="controls">
    <button class="ctrl-btn" id="btn-pause">⏸ Pause</button>
    <button class="ctrl-btn danger" id="btn-clear">Clear session</button>
  </div>

  <div id="task-list">
    <div class="empty">
      <span class="empty-icon">∅</span>
      No tasks recorded yet.<br>Browse normally to begin.
    </div>
  </div>

  <footer class="footer" id="footer" style="display:none">
    <div class="footer-stat">Tasks: <strong id="stat-tasks">0</strong></div>
    <div class="footer-stat">Trees: <strong id="stat-trees">0</strong></div>
    <div class="footer-stat">Total runs: <strong id="stat-runs">0</strong></div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
