<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Seed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 200px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #111;
      color: #e8e8e8;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    header .logo { font-size: 18px; }

    .controls {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    button {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1e1e1e;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #2a2a2a; color: #fff; }
    button.danger:hover { background: #3a1a1a; border-color: #6b2a2a; color: #f88; }

    #task-list { padding: 8px 0; }

    .empty {
      padding: 24px 16px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid #1a1a1a;
      cursor: default;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #181818; }

    .task-icon { font-size: 16px; flex-shrink: 0; }

    .task-info { flex: 1; min-width: 0; }

    .task-url {
      font-size: 11px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-meta {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    .task-state {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .task-state.seed   { background: #1e2e1e; color: #5a9a5a; }
    .task-state.sprout { background: #1a2e20; color: #4caf72; }
    .task-state.tree   { background: #143020; color: #3ddc74; border: 1px solid #2a6040; }

    .delete-btn {
      flex: none;
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.35;
      transition: opacity 0.15s, background 0.15s;
    }

    .task-item:hover .delete-btn { opacity: 0.7; }
    .delete-btn:hover { opacity: 1 !important; background: #3a1a1a !important; }
  </style>
</head>
<body>
  <header>
    <span class="logo">🌱</span>
    <h1>Open Seed</h1>
  </header>

  <div class="controls">
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-clear">🗑 Clear session</button>
  </div>

  <div id="task-list">
    <div class="empty">No tasks recorded yet.<br>Browse and interact normally.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
